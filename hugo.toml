baseURL = "https://portfolio.pages.dev/"
languageCode = "en-us"
title = "Tanvir Shakil Joy | Software Engineer"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  title = "Tanvir Shakil Joy"
  description = "Portfolio of Tanvir Shakil Joy — Junior Software Engineer at TechnoNext Software Ltd. Full-stack developer experienced in Ruby on Rails, Spring Boot, Go, Python, and Docker."
  keywords = ["Tanvir Shakil Joy", "Software Engineer", "Portfolio", "Full Stack Developer", "Ruby on Rails", "Spring Boot", "Go", "Python"]
  author = "Tanvir Shakil Joy"
  defaultTheme = "dark"
  disableThemeToggle = false
